<header>
  <h3 class="title-30" i18n>Local disk source</h3>
</header>

<section content>
  <app-file-tree [customRemoteMode]="'diskimage'">
    <label for="path" i18n>Folder path</label>
    <input
      type="text"
      id="path"
      tabindex="4"
      i18n-placeholder
      placeholder="Path"
      [(ngModel)]="path" />
  </app-file-tree>
</section>

<footer footer class="sticky">
  <button shButton type="button" (click)="closed.emit(null)" i18n>Cancel</button>
  <button shButton type="button" class="raised primary" [disabled]="!isValid()" (click)="submit()" i18n>
    Use this source
  </button>
</footer>
