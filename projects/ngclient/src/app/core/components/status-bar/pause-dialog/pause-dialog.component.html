<header header>
  <h3 i18n>Pause settings</h3>
</header>

<div content>
  <div class="radios">
    @for (option of pauseOptions(); track $index) {
      <sh-radio
        [checked]="pauseOption() === option.value"
        class="primary raised"
        (checkedChange)="pauseOption.set(option.value)">
        {{ option.label }}
      </sh-radio>
    }
  </div>

  <div class="check-wrap">
    <sh-checkbox [(checked)]="pauseTransfers" class="primary raised" i18n>Also pause transfers</sh-checkbox>

    <sh-alert type="warning" i18n>If you pause transfers they could time out and cause retries or failures.</sh-alert>
  </div>
</div>

<footer footer>
  <button shButton (click)="closed.emit()" i18n>Cancel</button>
  <button shButton class="raised primary" [class.loading]="isSubmitting()" (click)="submit()" i18n>
    Update settings
  </button>
</footer>
